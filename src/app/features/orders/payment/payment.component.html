<div class="payment-container fade-in">
  <h1>Payment</h1>

  <div class="payment-layout" *ngIf="order">
    <section class="payment-methods">
      <h2>Payment Method</h2>

      <div class="payment-option" [class.selected]="selectedMode === 'COD'" (click)="selectedMode = 'COD'">
        <div class="radio-circle" [class.active]="selectedMode === 'COD'"></div>
        <div class="option-info">
          <span class="option-title">Cash on Delivery</span>
          <span class="option-desc">Pay when your order arrives.</span>
        </div>
      </div>

      <div class="payment-option" [class.selected]="selectedMode === 'PREPAID'" (click)="selectedMode = 'PREPAID'">
        <div class="radio-circle" [class.active]="selectedMode === 'PREPAID'"></div>
        <div class="option-info">
          <span class="option-title">Pay Online</span>
          <span class="option-desc">UPI, Credit/Debit Card, Netbanking via Razorpay</span>
        </div>
      </div>

      <button class="btn-pay" (click)="onPayNow()" [disabled]="isProcessing">
        <span *ngIf="!isProcessing">{{ selectedMode === 'COD' ? 'Place Order' : 'Pay Now' }}</span>
        <span *ngIf="isProcessing">Processing...</span>
      </button>
    </section>

    <aside class="summary-card">
      <h2>Order Summary</h2>
      <p class="order-id">Order #{{ order.id }}</p>
      <div class="summary-items">
        <div class="summary-item" *ngFor="let item of order.items">
          <span class="item-name">{{ item.productName }}</span>
          <span class="item-qty">x{{ item.quantity }}</span>
          <span class="item-price">&#8377;{{ item.subtotal | number:'1.2-2' }}</span>
        </div>
      </div>
      <div class="summary-divider"></div>
      <div class="summary-total">
        <span>Total</span>
        <span>&#8377;{{ order.totalAmount | number:'1.2-2' }}</span>
      </div>
    </aside>
  </div>
</div>
