<div class="payment-container fade-in" *ngIf="order">
  <h1>Payment</h1>

  <div class="payment-layout">
    <section class="payment-methods">
      <h2>Payment Method</h2>

      <label class="method-option">
        <input type="radio" name="paymentMode" value="COD" [checked]="selectedMode === 'COD'" (change)="selectedMode = 'COD'">
        <span>
          <strong>Cash on Delivery</strong>
          <small>Pay when your order arrives.</small>
        </span>
      </label>

      <label class="method-option disabled">
        <input type="radio" name="paymentMode" value="UPI" disabled>
        <span>
          <strong>UPI <span class="coming-soon">Coming Soon</span></strong>
          <small>Pay using Google Pay, PhonePe, Paytm</small>
        </span>
      </label>

      <label class="method-option disabled">
        <input type="radio" name="paymentMode" value="CARD" disabled>
        <span>
          <strong>Card <span class="coming-soon">Coming Soon</span></strong>
          <small>Use credit or debit card.</small>
        </span>
      </label>

      <button class="btn-pay" [disabled]="isProcessing" (click)="onPayNow()">
        <span *ngIf="!isProcessing">Pay Now</span>
        <span *ngIf="isProcessing">Processing Payment...</span>
      </button>
    </section>

    <aside class="summary-card">
      <h2>Order Summary</h2>
      <div class="order-id">Order #{{ order.id }}</div>
      <div class="summary-items">
        <div class="summary-item" *ngFor="let item of order.items">
          <div>
            <span class="item-name">{{ item.productName }}</span>
            <span class="item-qty">x{{ item.quantity }}</span>
          </div>
          <span class="item-price">&#8377;{{ item.subtotal | number:'1.2-2' }}</span>
        </div>
      </div>
      <div class="summary-divider"></div>
      <div class="summary-total">
        <span>Total</span>
        <span>&#8377;{{ order.totalAmount | number:'1.2-2' }}</span>
      </div>
    </aside>
  </div>
</div>
