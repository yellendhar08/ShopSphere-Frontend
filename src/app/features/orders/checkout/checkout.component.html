<div class="checkout-container fade-in">
  <h1>Checkout</h1>

  <div class="checkout-layout" *ngIf="cart">
    <section class="checkout-form">
      <h2>Shipping Details</h2>
      <div class="form-group">
        <label for="address">Full Address</label>
        <textarea
          id="address"
          [(ngModel)]="shippingAddress"
          placeholder="Enter your full delivery address including city and zip code"
          rows="7"
        ></textarea>
      </div>
      <button class="btn-proceed" [disabled]="isProcessing || !shippingAddress.trim()" (click)="onSubmit()">
        <span *ngIf="!isProcessing">Place Order</span>
        <span *ngIf="isProcessing">Processing...</span>
      </button>
    </section>

    <aside class="summary-card">
      <h2>Order Summary</h2>
      <div class="summary-items">
        <div class="summary-item" *ngFor="let item of cart.items">
          <div>
            <span class="item-name">{{ item.productName }}</span>
            <span class="item-qty">Qty: {{ item.quantity }}</span>
          </div>
          <span class="item-price">&#8377;{{ item.subtotal | number:'1.2-2' }}</span>
        </div>
      </div>
      <div class="summary-divider"></div>
      <div class="summary-total">
        <span>Total</span>
        <span>&#8377;{{ cart.totalAmount | number:'1.2-2' }}</span>
      </div>
    </aside>
  </div>
</div>
