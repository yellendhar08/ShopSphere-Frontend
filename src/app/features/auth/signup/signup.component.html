<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h2>Create an Account</h2>
      <p>Join ShopSphere today</p>
    </div>

    <form [formGroup]="signupForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input 
          id="name" 
          type="text" 
          formControlName="name" 
          placeholder="Enter your full name"
          [class.is-invalid]="signupForm.get('name')?.invalid && signupForm.get('name')?.touched"
        />
        <div class="error-message" *ngIf="signupForm.get('name')?.invalid && signupForm.get('name')?.touched">
          <span *ngIf="signupForm.get('name')?.errors?.['required']">Name is required.</span>
          <span *ngIf="signupForm.get('name')?.errors?.['minlength']">Name must be at least 2 characters long.</span>
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input 
          id="email" 
          type="email" 
          formControlName="email" 
          placeholder="Enter your email"
          [class.is-invalid]="signupForm.get('email')?.invalid && signupForm.get('email')?.touched"
        />
        <div class="error-message" *ngIf="signupForm.get('email')?.invalid && signupForm.get('email')?.touched">
          <span *ngIf="signupForm.get('email')?.errors?.['required']">Email is required.</span>
          <span *ngIf="signupForm.get('email')?.errors?.['email']">Please enter a valid email address.</span>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input 
          id="password" 
          type="password" 
          formControlName="password" 
          placeholder="Create a password (min 6 characters)"
          [class.is-invalid]="signupForm.get('password')?.invalid && signupForm.get('password')?.touched"
        />
        <div class="error-message" *ngIf="signupForm.get('password')?.invalid && signupForm.get('password')?.touched">
          <span *ngIf="signupForm.get('password')?.errors?.['required']">Password is required.</span>
          <span *ngIf="signupForm.get('password')?.errors?.['minlength']">Password must be at least 6 characters.</span>
        </div>
      </div>

      <button type="submit" class="btn-submit" [disabled]="signupForm.invalid || isLoading">
        <span *ngIf="!isLoading">Sign Up</span>
        <span *ngIf="isLoading" class="loading-text">Creating account...</span>
      </button>
    </form>

    <div class="auth-footer">
      <p>Already have an account? <a routerLink="/login">Login here</a></p>
    </div>
  </div>
</div>
