<div class="product-detail-container fade-in" *ngIf="product">
  <nav class="breadcrumb">
    <a routerLink="/customer/home">Home</a>
    <span>></span>
    <a routerLink="/customer/products">Products</a>
    <span>></span>
    <span class="current">{{ product.name }}</span>
  </nav>

  <div class="product-layout">
    <div class="image-section">
      <img [src]="imageUrl" [alt]="product.name" class="main-image">
    </div>

    <div class="info-section">
      <p class="category-badge" *ngIf="product.categoryName">{{ product.categoryName }}</p>
      <h1>{{ product.name }}</h1>

      <div class="stock-status">
        <span class="badge in-stock" *ngIf="!isOutOfStock">In Stock ({{ product.stock }} available)</span>
        <span class="badge out-of-stock" *ngIf="isOutOfStock">Out of Stock</span>
      </div>

      <div class="price">&#8377;{{ product.price | number:'1.2-2' }}</div>

      <div class="description-section">
        <h2>Description</h2>
        <p>{{ product.description }}</p>
      </div>

      <div class="action-section" *ngIf="!isOutOfStock">
        <div class="quantity-selector">
          <button class="btn-qty" (click)="decreaseQuantity()" [disabled]="quantity <= 1">-</button>
          <input type="number" class="qty-input" [(ngModel)]="quantity" readonly>
          <button class="btn-qty" (click)="increaseQuantity()" [disabled]="quantity >= product.stock">+</button>
        </div>

        <button class="btn-add-cart" (click)="addToCart()">Add to Cart</button>
      </div>

      <div class="action-section" *ngIf="isOutOfStock">
        <button class="btn-add-cart" disabled>Currently Unavailable</button>
      </div>
    </div>
  </div>
</div>
