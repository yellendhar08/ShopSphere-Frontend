<div class="home-container fade-in">
  <!-- Carousel Banner -->
  <section class="carousel-container">
    <div class="carousel-track" [style.transform]="'translateX(-' + (currentSlide * 100) + '%)'">
      <div 
        *ngFor="let slide of slides" 
        class="carousel-slide"
        (click)="onSlideClick(slide.categoryId)"
      >
        <img [src]="slide.image" [alt]="slide.label">
      </div>
    </div>

    <!-- Navigation Arrows -->
    <button class="carousel-arrow prev" (click)="prevSlide(); $event.stopPropagation()">‹</button>
    <button class="carousel-arrow next" (click)="nextSlide(); $event.stopPropagation()">›</button>

    <!-- Dot Indicators -->
    <div class="carousel-dots">
      <span 
        *ngFor="let slide of slides; let i = index" 
        class="dot"
        [class.active]="i === currentSlide"
        (click)="goToSlide(i); $event.stopPropagation()"
      ></span>
    </div>
  </section>

  <section class="featured-section">
    <div class="section-header">
      <h2>Featured Products</h2>
      <a routerLink="/customer/products">View All -></a>
    </div>

    <div class="product-row" *ngIf="featuredProducts.length > 0; else noFeatured">
      <app-product-card *ngFor="let product of featuredProducts" [product]="product"></app-product-card>
    </div>
    <ng-template #noFeatured>
      <p class="empty-state">No featured products available at the moment.</p>
    </ng-template>
  </section>

  <section class="categories-section">
    <div class="section-header centered">
      <h2>Shop by Category</h2>
    </div>

    <div class="category-row" *ngIf="categories.length > 0; else noCategories">
      <a
        *ngFor="let category of categories"
        [routerLink]="['/customer/products']"
        [queryParams]="{ categoryId: category.id }"
        class="category-card"
      >
        <div class="category-icon">{{ getCategoryIcon(category.name) }}</div>
        <h3>{{ category.name }}</h3>
      </a>
    </div>
    <ng-template #noCategories>
      <p class="empty-state">No categories available.</p>
    </ng-template>
  </section>
</div>
