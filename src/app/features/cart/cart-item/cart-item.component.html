<div class="cart-item-card">
  <div class="item-image-container">
    <img [src]="imageUrl" [alt]="item.productName" class="item-image" [routerLink]="['/products', item.productId]">
  </div>
  
  <div class="item-details">
    <h3 class="item-name" [routerLink]="['/products', item.productId]">{{ item.productName }}</h3>
    <p class="item-price">&#8377;{{ item.price | number:'1.2-2' }}</p>
  </div>
  
  <div class="item-actions">
    <div class="quantity-controls">
      <button class="btn-qty" (click)="decreaseQuantity()">-</button>
      <span class="qty-display">{{ item.quantity }}</span>
      <button class="btn-qty" (click)="increaseQuantity()">+</button>
    </div>
    
    <div class="subtotal-remove">
      <span class="item-subtotal">&#8377;{{ item.subtotal | number:'1.2-2' }}</span>
      <button class="btn-remove" (click)="removeItem()" title="Remove Item">🗑️</button>
    </div>
  </div>
</div>
