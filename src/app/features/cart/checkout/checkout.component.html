<div class="checkout-container">
  <h1>Checkout</h1>

  <div class="checkout-layout" *ngIf="cart">
    <div class="checkout-form">
      <div class="card">
        <h2>Shipping Information</h2>
        <div class="form-group">
          <label for="address">Shipping Address <span class="required">*</span></label>
          <textarea 
            id="address" 
            [(ngModel)]="shippingAddress" 
            placeholder="Enter your full delivery address including city and zip code"
            rows="4"
          ></textarea>
        </div>
      </div>
    </div>

    <div class="checkout-summary">
      <div class="card summary-card">
        <h2>Order Summary</h2>
        
        <div class="summary-items">
          <div class="summary-item" *ngFor="let item of cart.items">
            <img [src]="item.imageUrl || 'https://placehold.co/400x300?text=No+Image'" [alt]="item.productName" class="item-img">
            <div class="item-details">
              <span class="item-name">{{ item.productName }}</span>
              <span class="item-qty">Qty: {{ item.quantity }}</span>
            </div>
            <span class="item-price">&#8377;{{ item.subtotal | number:'1.2-2' }}</span>
          </div>
        </div>
        
        <div class="summary-divider"></div>
        
        <div class="summary-total">
          <span>Total Amount</span>
          <span>&#8377;{{ cart.totalAmount | number:'1.2-2' }}</span>
        </div>

        <button 
          class="btn-proceed" 
          [disabled]="isProcessing || !shippingAddress.trim()"
          (click)="onSubmit()">
          <span *ngIf="!isProcessing">Confirm & Proceed to Payment</span>
          <span *ngIf="isProcessing">Processing...</span>
        </button>
      </div>
    </div>
  </div>
</div>
