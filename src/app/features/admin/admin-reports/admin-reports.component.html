<div class="admin-container fade-in">
  <h1>Store Reports</h1>

  <div class="loading-state" *ngIf="isLoading">Generating reports...</div>

  <ng-container *ngIf="!isLoading">
    <div class="kpi-grid">
      <div class="kpi-card">
        <span class="kpi-label">Total Orders</span>
        <span class="kpi-value">{{ totalOrders }}</span>
      </div>
      <div class="kpi-card">
        <span class="kpi-label">Total Revenue</span>
        <span class="kpi-value revenue">&#8377;{{ totalRevenue | number:'1.2-2' }}</span>
      </div>
      <div class="kpi-card">
        <span class="kpi-label">Average Order Value</span>
        <span class="kpi-value">&#8377;{{ averageOrderValue | number:'1.2-2' }}</span>
      </div>
    </div>

    <section class="status-section">
      <h2>Orders by Status</h2>
      <div class="status-grid">
        <div class="status-card" *ngFor="let status of statusKeys">
          <span>{{ status }}</span>
          <strong>{{ statusCounts[status] }}</strong>
        </div>
        <div class="empty-state" *ngIf="statusKeys.length === 0">No orders data available.</div>
      </div>
    </section>
  </ng-container>
</div>
