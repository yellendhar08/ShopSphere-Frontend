<div class="admin-container fade-in">
  <h1>Manage Categories</h1>

  <section class="card create-card">
    <h2>Create New Category</h2>
    <div class="form-group">
      <input type="text" [(ngModel)]="newCategoryName" placeholder="Enter category name" (keyup.enter)="onCreate()" />
      <button class="btn-primary" (click)="onCreate()" [disabled]="isLoading || !newCategoryName.trim()">
        {{ isLoading ? 'Creating...' : 'Create' }}
      </button>
    </div>
  </section>

  <section class="card table-card">
    <h2>Categories</h2>
    <table class="data-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let cat of categories">
          <td>{{ cat.id }}</td>
          <td>{{ cat.name }}</td>
        </tr>
        <tr *ngIf="categories.length === 0">
          <td colspan="2" class="empty-state">No categories found.</td>
        </tr>
      </tbody>
    </table>
  </section>
</div>
