<div class="admin-container">
  <div class="page-header">
    <h1>Manage Products</h1>
    <a routerLink="/admin/products/new" class="btn-primary">Add Product</a>
  </div>

  <div class="table-card">
    <div class="loading-state" *ngIf="isLoading">Loading products...</div>

    <table class="data-table" *ngIf="!isLoading">
      <thead>
        <tr>
          <th>Image</th>
          <th>Name</th>
          <th>Category</th>
          <th>Price</th>
          <th>Stock</th>
          <th>Is Featured</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let product of products">
          <td>
            <img [src]="product.imageUrl || 'https://placehold.co/400x300?text=No+Image'" alt="Product Image" class="product-thumb">
          </td>
          <td class="product-name">{{ product.name }}</td>
          <td>{{ product.categoryName }}</td>
          <td class="amount">&#8377;{{ product.price | number:'1.2-2' }}</td>
          <td>
            <span [class.text-error]="product.stock === 0">{{ product.stock }}</span>
          </td>
          <td>
            <span class="badge" [class.badge-yes]="product.isFeatured" [class.badge-no]="!product.isFeatured">
              {{ product.isFeatured ? 'Yes' : 'No' }}
            </span>
          </td>
          <td>
            <div class="actions">
              <a [routerLink]="['/admin/products', product.id, 'edit']" class="btn-icon edit">Edit</a>
              <button class="btn-icon delete" (click)="deleteProduct(product.id)">Delete</button>
            </div>
          </td>
        </tr>
        <tr *ngIf="products.length === 0">
          <td colspan="7" class="empty-state">No products found. Add some!</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
