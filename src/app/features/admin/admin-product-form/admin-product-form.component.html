<div class="admin-container">
  
  <nav class="breadcrumb">
    <a routerLink="/admin/products">← Back to Products</a>
  </nav>

  <div class="form-card">
    <h1>{{ isEditMode ? 'Edit Product' : 'Add New Product' }}</h1>

    <div class="loading-state" *ngIf="isLoading">Loading...</div>

    <form [formGroup]="productForm" (ngSubmit)="onSubmit()" *ngIf="!isLoading">
      
      <div class="form-row">
        <div class="form-group">
          <label for="name">Product Name <span class="required">*</span></label>
          <input type="text" id="name" formControlName="name" placeholder="Enter product name">
          <div class="error-msg" *ngIf="isInvalid('name')">Product name is required.</div>
        </div>

        <div class="form-group">
          <label for="categoryId">Category <span class="required">*</span></label>
          <select id="categoryId" formControlName="categoryId">
            <option value="" disabled>Select a category</option>
            <option *ngFor="let cat of categories" [value]="cat.id">{{ cat.name }}</option>
          </select>
          <div class="error-msg" *ngIf="isInvalid('categoryId')">Please select a category.</div>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="price">Price (&#8377;) <span class="required">*</span></label>
          <input type="number" id="price" formControlName="price" step="0.01" min="0.01" placeholder="0.00">
          <div class="error-msg" *ngIf="isInvalid('price')">Valid price greater than 0 is required.</div>
        </div>

        <div class="form-group">
          <label for="stock">Stock Quantity <span class="required">*</span></label>
          <input type="number" id="stock" formControlName="stock" step="1" min="0" placeholder="0">
          <div class="error-msg" *ngIf="isInvalid('stock')">Valid stock amount is required (min 0).</div>
        </div>
      </div>

      <div class="form-group">
        <label for="imageUrl">Image URL</label>
        <input type="text" id="imageUrl" formControlName="imageUrl" placeholder="Paste Cloudinary URL here">
      </div>

      <div class="form-group">
        <label for="description">Description</label>
        <textarea id="description" formControlName="description" rows="4" placeholder="Enter product description"></textarea>
      </div>

      <div class="form-group checkbox-group">
        <label class="checkbox-container">
          <input type="checkbox" formControlName="isFeatured">
          <span class="checkmark"></span>
          Is Featured Product
        </label>
      </div>

      <div class="form-actions">
        <button type="button" class="btn-cancel" routerLink="/admin/products">Cancel</button>
        <button type="submit" class="btn-submit" [disabled]="isSubmitting || productForm.invalid">
          {{ isSubmitting ? 'Saving...' : (isEditMode ? 'Update Product' : 'Create Product') }}
        </button>
      </div>
      
    </form>
  </div>
</div>
