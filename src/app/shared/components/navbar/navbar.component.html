<nav class="navbar">
  <div class="navbar-container">
    <a routerLink="/home" class="brand">
      <img src="assets/images/logo.png" alt="ShopSphere" height="60" style="vertical-align: middle;">
    </a>

    <div class="search-bar">
      <input type="text" placeholder="Search products..." [(ngModel)]="searchQuery" (keyup.enter)="onSearch()" />
      <button (click)="onSearch()">🔍</button>
    </div>

    <div class="nav-actions">
      <!-- NOT logged in -->
      <ng-container *ngIf="!(authService.currentUser$ | async)">
        <a routerLink="/login" class="nav-link">Login</a>
        <a routerLink="/signup" class="btn btn-primary">Sign Up</a>
      </ng-container>

      <!-- Logged in as CUSTOMER or ADMIN -->
      <ng-container *ngIf="(authService.currentUser$ | async) as user">

        <!-- CUSTOMER specific links -->
        <ng-container *ngIf="user.role === 'CUSTOMER'">
          <a routerLink="/cart" class="nav-icon cart-icon">
            🛒
            <span class="badge" *ngIf="cartCount > 0">{{ cartCount }}</span>
          </a>
        </ng-container>

        <!-- ADMIN specific links -->
        <ng-container *ngIf="user.role === 'ADMIN'">
          <a routerLink="/admin" class="nav-link admin-link">Admin Panel</a>
        </ng-container>

        <!-- Shared for authenticated users (Profile Dropdown) -->
        <div class="profile-dropdown">
          <button class="dropdown-trigger" (click)="toggleDropdown()">
            <span class="user-icon">👤</span>
            <span class="user-email">{{ user.email }}</span>
          </button>
          
          <div class="dropdown-menu" *ngIf="isDropdownOpen">
            <a routerLink="/my-orders" class="dropdown-item" (click)="isDropdownOpen = false">My Orders</a>
            <button class="dropdown-item" (click)="logout()">Logout</button>
          </div>
        </div>
      </ng-container>
    </div>
  </div>
</nav>
