<nav class="navbar">
  <div class="navbar-container">
    <div class="nav-left">
      <a routerLink="/customer/home" routerLinkActive="active" class="nav-link">Home</a>
      <a routerLink="/customer/products" routerLinkActive="active" class="nav-link">Products</a>
    </div>

    <a routerLink="/customer/home" class="brand">
      <img src="assets/images/logo.png" alt="ShopSphere">
    </a>

    <div class="nav-actions">
      <div class="search-bar">
        <input type="text" placeholder="Search products" [(ngModel)]="searchQuery" (keyup.enter)="onSearch()" />
        <button type="button" (click)="onSearch()" aria-label="Search">Search</button>
      </div>

      <ng-container *ngIf="!(authService.currentUser$ | async)">
        <a routerLink="/auth/login" class="nav-link">Login</a>
        <a routerLink="/auth/signup" class="signup-btn">Sign Up</a>
      </ng-container>

      <ng-container *ngIf="(authService.currentUser$ | async) as user">
        <ng-container *ngIf="user.role === 'CUSTOMER'">
          <a routerLink="/customer/cart" class="nav-icon cart-icon" aria-label="Cart">
            <span class="badge" *ngIf="cartCount > 0">{{ cartCount }}</span>
          </a>
        </ng-container>

        <ng-container *ngIf="user.role === 'ADMIN'">
          <a routerLink="/admin" class="nav-link admin-link">Admin Panel</a>
        </ng-container>

        <div class="profile-dropdown">
          <button type="button" class="dropdown-trigger" (click)="toggleDropdown()" aria-label="Account menu">
            <span class="user-icon" aria-hidden="true"></span>
          </button>

          <div class="dropdown-menu" *ngIf="isDropdownOpen">
            <span class="dropdown-email">{{ user.email }}</span>
            <a routerLink="/customer/orders" class="dropdown-item" (click)="isDropdownOpen = false">My Orders</a>
            <button class="dropdown-item" (click)="logout()">Logout</button>
          </div>
        </div>
      </ng-container>
    </div>
  </div>
</nav>
